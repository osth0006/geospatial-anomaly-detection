services:
  analysis:
    build: .
    command: python run_pipeline.py
    volumes:
      - ./data:/app/data
      - ./output:/app/output

  notebook:
    build: .
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./notebooks:/app/notebooks
